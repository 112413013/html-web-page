<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account - Trend Aura Fabrics</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            margin:0;
            padding:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#000,#1a1a1a);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .signup-box{
            width:350px;
            background:white;
            padding:35px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            color:#c9a227;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:black;
            color:gold;
            border:none;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
            margin-top:15px;
        }

        button:hover{
            background:#222;
        }

        a{
            text-decoration:none;
            color:#c9a227;
        }
    </style>

</head>
<body>

<div class="signup-box">

    <h1>Create Account</h1>

    <form action="login.html">

        <input type="email"
               placeholder="Enter Email ID"
               required>

        <input type="password"
               placeholder="Enter Password"
               required>

        <button type="submit">
            Create Account
        </button>

    </form>

    <br>

    <a href="index.html">← Back to Home</a>

</div>

</body>
</html>
